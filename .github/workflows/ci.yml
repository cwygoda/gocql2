name: CI
run-name: ${{ github.event.pull_request.title || github.ref_name }} - CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -mod=readonly

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          args: ./...

  test:
    name: Tests (${{ matrix.os }}, Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            go-version: stable
          - os: ubuntu-latest
            go-version: oldstable
          - os: macos-latest
            go-version: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: go.sum

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Run tests
        id: tests
        run: gotestsum --junitfile junit.xml -- -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == 'stable'
        with:
          files: ./coverage.out
          flags: go
          name: go-${{ matrix.go-version }}-${{ matrix.os }}
          fail_ci_if_error: true
          use_oidc: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}-go-${{ matrix.go-version }}
          path: coverage.out
          if-no-files-found: warn

      - name: Upload JUnit artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-${{ matrix.os }}-go-${{ matrix.go-version }}
          path: junit.xml
          if-no-files-found: warn

  mod:
    name: Modules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: go.sum

      - name: Run go mod tidy
        run: go mod tidy

      - name: Check go.mod and go.sum are tidy
        run: git diff --exit-code -- go.mod go.sum

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: go.sum

      - name: Build Go docs
        shell: bash
        run: |
          while IFS= read -r pkg; do
            go doc "$pkg" >/dev/null
          done < <(go list ./...)

      - name: Lint Markdown docs
        run: npx --yes markdownlint-cli2

      - name: Check documentation links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose README.md REFERENCES.md
          fail: true

  actions:
    name: Actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: go.sum

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Run actionlint
        run: actionlint

  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - lint
      - test
      - mod
      - docs
      - actions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Record pre-release commit
        id: before
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create version commit and tag
        uses: cocogitto/cocogitto-action@v4
        with:
          command: bump
          args: --auto --skip-ci
          git-user: github-actions[bot]
          git-user-email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Detect release
        id: bump
        shell: bash
        run: |
          after="$(git rev-parse HEAD)"

          if [[ "${{ steps.before.outputs.sha }}" == "$after" ]]; then
            echo "No releasable commits found."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(git describe --tags --exact-match "$after")"
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        if: steps.bump.outputs.released == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "$VERSION"

      - name: Generate GitHub release changelog
        if: steps.bump.outputs.released == 'true'
        id: changelog
        uses: cocogitto/cocogitto-action@v4
        with:
          command: changelog
          args: --at ${{ steps.bump.outputs.version }}

      - name: Create GitHub Release
        if: steps.bump.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          body: ${{ steps.changelog.outputs.stdout }}
