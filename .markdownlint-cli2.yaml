globs:
  - "**/*.md"
ignores:
  - ".notes/**"
  # Generated by cocogitto; let cog own formatting.
  - "CHANGELOG.md"

config:
  # Prefer readable Markdown over hard wrapping, especially for examples and links.
  MD013: false
  # Tables must have a consistent pipe style and column count.
  MD055:
    style: leading_and_trailing
  MD056: true
